_target_: src.models.satsemseg_module.SatSemSegLitModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: max
  factor: 0.5
  patience: 3
  min_lr: 1e-7

net:
  _target_: src.models.components.unet_resnet34.UNetResNet34
  in_channels: 3
  num_classes: 6
  pretrained: True

criterion:
  _target_: src.models.components.losses.FocalDiceLoss
  focal_weight: 0.5
  dice_weight: 0.5
  alpha: 1.0
  gamma: 2.0
  ignore_index: 255

num_classes: 6
ignore_index: 255

# compile model for faster training with pytorch 2.0
compile: false
