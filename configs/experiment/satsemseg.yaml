# @package _global_

# to execute this experiment run:
# python src/train.py experiment=satsemseg

defaults:
  - override /data: satsemseg
  - override /model: satsemseg
  - override /callbacks: default
  - override /trainer: default
  - override /logger: aim

tags: ["satsemseg", "unet_resnet34"]

seed: 42

trainer:
  min_epochs: 10
  max_epochs: 50
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.0001

data:
  batch_size: 8
  image_size: 512

callbacks:
  model_checkpoint:
    monitor: "val/iou"
    mode: "max"
  early_stopping:
    monitor: "val/iou"
    mode: "max"
    patience: 10

logger:
  aim:
    experiment: "satsemseg"
